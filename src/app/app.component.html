<div class="container mx-auto">
  <div class="flex items-center pt-4 pb-4">
    <div class="flex-1 flex justify-start">
      <p class="text-4xl font-bold">Draconis</p>
    </div>
    <div class="flex-1 flex justify-center">
      @if (fightService.getProceedMessage() != null) {
        <div>
          <button class="text-white bg-blue-500 font-bold px-4 py-2 rounded" (click)="fightService.onProceed()">
            {{fightService.getProceedMessage()}}
          </button>
        </div>
      }
    </div>
    <div class="flex-1 flex justify-end">
      <div class="text-xl">
        {{ fightService.game.region }}
        @if (fightService.game.oppositionId > 0) {
          <span>
            <span class="text-gray-500">/ Fight </span> {{ fightService.game.oppositionId }}
          </span>
        }
      </div>
    </div>
  </div>

  <app-fight></app-fight>
</div>
